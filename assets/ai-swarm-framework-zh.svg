<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#eef4ff"/>
    </linearGradient>
    <linearGradient id="nas" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6d5dfc"/>
      <stop offset="1" stop-color="#16b7c8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#1b2b5a" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#5271c4"/>
    </marker>
    <style>
      .title{font-family:'Noto Sans TC','Microsoft JhengHei',Arial,sans-serif;font-weight:800;fill:#13213d}
      .txt{font-family:'Noto Sans TC','Microsoft JhengHei',Arial,sans-serif;fill:#24324f}
      .small{font-family:'Noto Sans TC','Microsoft JhengHei',Arial,sans-serif;fill:#5a6680}
      .chip{font-family:'Noto Sans TC','Microsoft JhengHei',Arial,sans-serif;font-weight:700;fill:#ffffff}
      .box{fill:#ffffff;stroke:#dce5f8;stroke-width:2;filter:url(#shadow)}
      .line{stroke:#5271c4;stroke-width:3;fill:none;marker-end:url(#arrow);stroke-linecap:round}
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <text x="800" y="72" class="title" font-size="48" text-anchor="middle">AI Swarm Framework</text>
  <text x="800" y="116" class="small" font-size="25" text-anchor="middle">不是 AI 群聊，而是多機 AI 的檔案式工作交付協議</text>

  <!-- Human -->
  <rect x="60" y="130" width="210" height="92" rx="22" class="box"/>
  <text x="165" y="168" class="title" font-size="27" text-anchor="middle">Human</text>
  <text x="165" y="199" class="small" font-size="20" text-anchor="middle">提出需求 / 審核決策</text>

  <!-- Center NAS -->
  <rect x="555" y="250" width="490" height="310" rx="34" fill="url(#nas)" filter="url(#shadow)"/>
  <path d="M600 315 h175 l32 38 h193 a25 25 0 0 1 25 25 v128 a25 25 0 0 1 -25 25 h-400 a25 25 0 0 1 -25 -25 v-166 a25 25 0 0 1 25 -25z" fill="#ffffff" opacity="0.18"/>
  <text x="800" y="322" class="chip" font-size="36" text-anchor="middle">共享資料夾 / NAS</text>
  <text x="800" y="365" class="chip" font-size="30" text-anchor="middle">AI_ControlCenter</text>

  <g transform="translate(610,398)">
    <rect width="136" height="38" rx="12" fill="#ffffff" opacity="0.95"/><text x="68" y="26" class="txt" font-size="18" text-anchor="middle">CORE.md</text>
    <rect x="150" width="136" height="38" rx="12" fill="#ffffff" opacity="0.95"/><text x="218" y="26" class="txt" font-size="18" text-anchor="middle">AGENTS.md</text>
    <rect x="300" width="136" height="38" rx="12" fill="#ffffff" opacity="0.95"/><text x="368" y="26" class="txt" font-size="18" text-anchor="middle">projects/</text>
    <rect y="54" width="136" height="38" rx="12" fill="#ffffff" opacity="0.95"/><text x="68" y="80" class="txt" font-size="18" text-anchor="middle">tasks</text>
    <rect x="150" y="54" width="136" height="38" rx="12" fill="#ffffff" opacity="0.95"/><text x="218" y="80" class="txt" font-size="18" text-anchor="middle">handoffs</text>
    <rect x="300" y="54" width="136" height="38" rx="12" fill="#ffffff" opacity="0.95"/><text x="368" y="80" class="txt" font-size="18" text-anchor="middle">outputs</text>
  </g>

  <!-- Agents -->
  <rect x="106" y="310" width="330" height="118" rx="26" class="box"/>
  <text x="271" y="350" class="title" font-size="30" text-anchor="middle">Coordinator 協調者</text>
  <text x="271" y="385" class="small" font-size="21" text-anchor="middle">監控進度 / 彙整狀態</text>
  <text x="271" y="414" class="small" font-size="19" text-anchor="middle">回答：目前做到哪裡？</text>

  <rect x="1164" y="310" width="330" height="118" rx="26" class="box"/>
  <text x="1329" y="350" class="title" font-size="30" text-anchor="middle">Planner 規劃者</text>
  <text x="1329" y="385" class="small" font-size="21" text-anchor="middle">拆任務 / 寫 prompt</text>
  <text x="1329" y="414" class="small" font-size="19" text-anchor="middle">審核輸出 / 交付下一步</text>

  <rect x="1164" y="590" width="330" height="118" rx="26" class="box"/>
  <text x="1329" y="630" class="title" font-size="30" text-anchor="middle">Producer 生產者</text>
  <text x="1329" y="665" class="small" font-size="21" text-anchor="middle">本地模型 / ComfyUI</text>
  <text x="1329" y="694" class="small" font-size="19" text-anchor="middle">GPU / 圖像與媒體生成</text>

  <rect x="106" y="590" width="330" height="118" rx="26" class="box"/>
  <text x="271" y="630" class="title" font-size="30" text-anchor="middle">Researcher 研究者</text>
  <text x="271" y="665" class="small" font-size="21" text-anchor="middle">網頁研究 / 爬蟲</text>
  <text x="271" y="694" class="small" font-size="19" text-anchor="middle">資料整理 / 來源摘要</text>

  <!-- Arrows -->
  <path class="line" d="M270 176 C410 180 470 255 555 315"/>
  <path class="line" d="M436 365 C485 365 510 365 555 365"/>
  <path class="line" d="M1045 365 C1092 365 1120 365 1164 365"/>
  <path class="line" d="M1045 500 C1110 535 1140 590 1164 640"/>
  <path class="line" d="M555 500 C490 535 460 590 436 640"/>
  <path class="line" d="M436 640 C520 560 555 540 620 520"/>

  <!-- Workflow strip -->
  <rect x="250" y="742" width="1100" height="76" rx="22" fill="#ffffff" stroke="#dce5f8" stroke-width="2" filter="url(#shadow)"/>
  <text x="800" y="774" class="title" font-size="24" text-anchor="middle">工作流程</text>
  <text x="800" y="806" class="txt" font-size="21" text-anchor="middle">需求 → task → agent 本地工作 → handoff → 下一個 agent 接手 → outputs / inbox → Coordinator 回報人類</text>

  <!-- Comparison -->
  <rect x="60" y="742" width="165" height="76" rx="20" fill="#fff4f4" stroke="#ffd0d0" stroke-width="2"/>
  <text x="142" y="773" class="title" font-size="20" text-anchor="middle" fill="#9a2b2b">不是群聊</text>
  <text x="142" y="802" class="small" font-size="16" text-anchor="middle">避免聊天失控</text>

  <rect x="1375" y="742" width="165" height="76" rx="20" fill="#f0fff8" stroke="#bdeed7" stroke-width="2"/>
  <text x="1458" y="773" class="title" font-size="20" text-anchor="middle" fill="#166846">預設安全</text>
  <text x="1458" y="802" class="small" font-size="16" text-anchor="middle">不傳遞刪除</text>

  <!-- footer -->
  <text x="800" y="858" class="small" font-size="19" text-anchor="middle">支援 Hermes / Claude / Codex / 本地模型；核心真相來源是共享資料夾中的任務、交付、狀態與產出檔案。</text>
</svg>
